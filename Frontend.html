<!-- Frontend-Frameworks -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bulma CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">

<title>Bulma Card</title>
</head>

<body>

<section class="section">
  <div class="container">
    <div class="columns is-centered">
      
      <div class="column is-4">
        <div class="card">
          
          <div class="card-image">
            <figure class="image is-4by3">
              <img src="https://via.placeholder.com/400x300" alt="Sample Image">
            </figure>
          </div>

          <div class="card-content">
            <p class="title is-4">Simple Card</p>
            <p class="content">
              This is a responsive card created using Bulma CSS framework.
              It automatically adjusts to different screen sizes.
            </p>
          </div>

        </div>
      </div>

    </div>
  </div>
</section>

</body>
</html>
